<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Reportes Agrupados UTCD</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="config.js"></script>
  <style>
    :root{--bg:#0b141d;--card:#14212d;--card2:#1a2a3a;--border:#2c3e50;--text:#fff;--muted:#a0aec0;--blue:#3b82f6;--green:#27ae60;--green2:#219653;--red:#e74c3c;--red2:#c0392b;}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;min-height:100vh;font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(160deg,#07101a,#0b141d 55%,#102034);color:var(--text);display:flex;align-items:center;justify-content:center;padding:18px;}
    .login-card{width:100%;max-width:410px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px;box-shadow:0 18px 45px rgba(0,0,0,.45)}
    .logo-box{width:92px;margin:0 auto 12px;background:white;border-radius:12px;padding:8px;display:flex;justify-content:center;align-items:center}
    .logo-box img{width:70px;height:auto;display:block}
    h1{margin:0;text-align:center;font-size:22px;letter-spacing:1px;line-height:1.25}
    .sub{text-align:center;color:var(--muted);font-size:13px;margin:8px 0 22px}
    label{font-size:13px;color:var(--muted);font-weight:700;margin-bottom:6px;display:block}
    .field{position:relative;margin-bottom:15px}
    .field i{position:absolute;left:13px;top:39px;color:var(--blue)}
    input{width:100%;background:#0f1b27;color:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 14px 14px 40px;font-size:16px;outline:none}
    input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.18)}
    .btn{width:100%;border:none;border-radius:12px;padding:14px 18px;background:var(--green);color:white;font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;box-shadow:0 6px 16px rgba(39,174,96,.35)}
    .btn:disabled{opacity:.7;cursor:not-allowed}
    .msg{margin-top:14px;text-align:center;font-size:13px;color:var(--red);min-height:18px}
    .note{margin-top:12px;text-align:center;color:var(--muted);font-size:12px}
  </style>
</head>
<body>
  <main class="login-card">
    <div class="logo-box"><img src="https://raw.githubusercontent.com/zelaya27/IMAGENES_AZ/main/UTCD%20Vertical.png" alt="UTCD"></div>
    <h1>REPORTES AGRUPADOS UTCD</h1>
    <div class="sub">Ingreso de usuario operativo</div>

    <div class="field">
      <label for="usuario">Usuario</label>
      <i class="fas fa-user"></i>
      <input id="usuario" autocomplete="username" placeholder="Ej. ALLAN.ZELAYA" oninput="this.value=this.value.toUpperCase()">
    </div>

    <div class="field">
      <label for="password">Contraseña</label>
      <i class="fas fa-lock"></i>
      <input id="password" type="password" autocomplete="current-password" placeholder="Ingrese contraseña">
    </div>

    <button id="btnLogin" class="btn" onclick="login()"><i class="fas fa-sign-in-alt"></i> Ingresar</button>
    <div id="msg" class="msg"></div>
    <div class="note">Sistema móvil conectado a Google Sheet</div>
  </main>

<script>
  function setLoading(btn, loading, text){
    if(!btn) return;
    if(loading){ btn.dataset.old = btn.innerHTML; btn.disabled = true; btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${text||'Cargando...'}`; }
    else{ btn.disabled = false; if(btn.dataset.old) btn.innerHTML = btn.dataset.old; }
  }

  function api(action, params={}){
    return new Promise((resolve,reject)=>{
      if(!CONFIG.URL_APPS_SCRIPT || CONFIG.URL_APPS_SCRIPT.includes('PEGAR_AQUI')){
        reject(new Error('Falta configurar URL_APPS_SCRIPT en config.js'));
        return;
      }
      const cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*100000);
      params.action = action;
      params.callback = cb;
      const qs = Object.keys(params).map(k => encodeURIComponent(k)+'='+encodeURIComponent(params[k] ?? '')).join('&');
      const script = document.createElement('script');
      const timer = setTimeout(()=>{ cleanup(); reject(new Error('Tiempo de espera agotado.')) }, 30000);
      function cleanup(){ clearTimeout(timer); delete window[cb]; if(script.parentNode) script.parentNode.removeChild(script); }
      window[cb] = (data)=>{ cleanup(); data && data.ok ? resolve(data) : reject(new Error((data && data.error) || 'Error desconocido')); };
      script.onerror = ()=>{ cleanup(); reject(new Error('No se pudo conectar con Apps Script.')); };
      script.src = CONFIG.URL_APPS_SCRIPT + '?' + qs;
      document.body.appendChild(script);
    });
  }

  async function login(){
    const btn = document.getElementById('btnLogin');
    const msg = document.getElementById('msg');
    msg.textContent = '';
    const usuario = document.getElementById('usuario').value.trim().toUpperCase();
    const password = document.getElementById('password').value.trim();
    if(!usuario || !password){ msg.textContent = 'Ingrese usuario y contraseña.'; return; }
    setLoading(btn,true,'Ingresando...');
    try{
      const data = await api('login',{usuario,password});
      sessionStorage.setItem('usuario', data.usuario);
      sessionStorage.setItem('sector', data.sector);
      sessionStorage.setItem('tipoUsuario', data.tipoUsuario);
      sessionStorage.setItem('tipoNombre', data.tipoNombre || '');
      sessionStorage.setItem('cuadrilla', data.cuadrilla || '');
      location.href = 'home.html';
    }catch(err){
      msg.textContent = err.message;
    }finally{
      setLoading(btn,false);
    }
  }

  document.addEventListener('keydown', e => { if(e.key === 'Enter') login(); });
</script>
</body>
</html>
