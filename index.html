<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Reportes Agrupados UTCD</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="config.js"></script>
  <style>
    :root{--ms-blue:#0078d4;--ms-blue-dark:#005a9e;--bg:#f3f6fb;--surface:#fff;--text:#201f1e;--muted:#605e5c;--border:#d2d0ce;--danger:#d13438;--shadow:0 18px 45px rgba(0,0,0,.12)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;min-height:100vh;font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(160deg,#eef6ff,#f7f9fc 55%,#e9f2fb);color:var(--text);display:flex;align-items:center;justify-content:center;padding:18px}
    .login-card{width:100%;max-width:420px;background:rgba(255,255,255,.95);border:1px solid rgba(255,255,255,.85);border-radius:24px;padding:24px;box-shadow:var(--shadow);backdrop-filter:blur(14px)}
    .logo-box{width:88px;height:88px;margin:0 auto 14px;background:#fff;border:1px solid #edebe9;border-radius:22px;padding:10px;display:flex;justify-content:center;align-items:center;box-shadow:0 8px 22px rgba(0,120,212,.12)}
    .logo-box img{width:66px;height:auto;display:block}
    h1{margin:0;text-align:center;font-size:22px;letter-spacing:.4px;line-height:1.25;color:#1b1a19}
    .sub{text-align:center;color:var(--muted);font-size:13px;margin:8px 0 22px}
    label{font-size:13px;color:var(--muted);font-weight:800;margin-bottom:7px;display:block}
    .field{position:relative;margin-bottom:15px}
    .field i.icon{position:absolute;left:14px;top:40px;color:var(--ms-blue)}
    input,select{width:100%;background:#fff;color:var(--text);border:1px solid var(--border);border-radius:14px;padding:14px 42px 14px 42px;font-size:16px;outline:none;transition:.18s}
    select{appearance:none}
    .select-arrow{position:absolute;right:14px;top:42px;color:var(--muted);pointer-events:none}
    input:focus,select:focus{border-color:var(--ms-blue);box-shadow:0 0 0 4px rgba(0,120,212,.14)}
    .btn{width:100%;border:none;border-radius:14px;padding:15px 18px;background:var(--ms-blue);color:white;font-weight:900;font-size:16px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;box-shadow:0 8px 22px rgba(0,120,212,.28)}
    .btn:active{transform:scale(.99)}
    .btn:disabled{opacity:.7;cursor:not-allowed}
    .msg{margin-top:14px;text-align:center;font-size:13px;color:var(--danger);min-height:18px}
    .mini{margin-top:-6px;margin-bottom:14px;color:var(--muted);font-size:12px;text-align:center}
  </style>
</head>
<body>
  <main class="login-card">
    <div class="logo-box"><img src="https://raw.githubusercontent.com/zelaya27/IMAGENES_AZ/main/UTCD%20Vertical.png" alt="UTCD"></div>
    <h1>REPORTES AGRUPADOS UTCD</h1>
    <div class="sub">Ingreso operativo</div>

    <div class="field">
      <label for="usuario">Usuario</label>
      <i class="fas fa-user icon"></i>
      <select id="usuario" autocomplete="username">
        <option value="">Cargando usuarios...</option>
      </select>
      <span class="select-arrow"><i class="fas fa-chevron-down"></i></span>
    </div>
    <div class="mini">Seleccione su usuario autorizado.</div>

    <div class="field">
      <label for="password">Contraseña</label>
      <i class="fas fa-lock icon"></i>
      <input id="password" type="password" autocomplete="current-password" placeholder="Ingrese contraseña">
    </div>

    <button id="btnLogin" class="btn" onclick="login()"><i class="fas fa-sign-in-alt"></i> Ingresar</button>
    <div id="msg" class="msg"></div>
  </main>

<script>
function setLoading(btn, loading, text){if(!btn)return;if(loading){btn.dataset.old=btn.innerHTML;btn.disabled=true;btn.innerHTML=`<i class="fas fa-spinner fa-spin"></i> ${text||'Cargando...'}`}else{btn.disabled=false;if(btn.dataset.old)btn.innerHTML=btn.dataset.old}}
function api(action, params={}){return new Promise((resolve,reject)=>{if(!CONFIG.URL_APPS_SCRIPT||CONFIG.URL_APPS_SCRIPT.includes('PEGAR_AQUI'))return reject(new Error('Falta configurar URL_APPS_SCRIPT en config.js'));const cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*100000);params.action=action;params.callback=cb;const qs=Object.keys(params).map(k=>encodeURIComponent(k)+'='+encodeURIComponent(params[k]??'')).join('&');const script=document.createElement('script');const timer=setTimeout(()=>{cleanup();reject(new Error('Tiempo de espera agotado.'))},30000);function cleanup(){clearTimeout(timer);delete window[cb];if(script.parentNode)script.parentNode.removeChild(script)}window[cb]=data=>{cleanup();data&&data.ok?resolve(data):reject(new Error((data&&data.error)||'Error desconocido'))};script.onerror=()=>{cleanup();reject(new Error('No se pudo conectar con Apps Script.'))};script.src=CONFIG.URL_APPS_SCRIPT+'?'+qs;document.body.appendChild(script)})}
async function cargarUsuarios(){const sel=document.getElementById('usuario'),msg=document.getElementById('msg');try{const data=await api('listarUsuarios');const usuarios=data.usuarios||[];sel.innerHTML='<option value="">Seleccione usuario</option>';usuarios.forEach(u=>{const op=document.createElement('option');op.value=u;op.textContent=u;sel.appendChild(op)});if(!usuarios.length)msg.textContent='No hay usuarios registrados en la hoja usuarios.'}catch(e){sel.innerHTML='<option value="">No se pudieron cargar usuarios</option>';msg.textContent=e.message}}
async function login(){const btn=document.getElementById('btnLogin'),msg=document.getElementById('msg');msg.textContent='';const usuario=document.getElementById('usuario').value.trim().toUpperCase();const password=document.getElementById('password').value.trim();if(!usuario||!password){msg.textContent='Seleccione usuario e ingrese contraseña.';return}setLoading(btn,true,'Ingresando...');try{const data=await api('login',{usuario,password});sessionStorage.setItem('usuario',data.usuario);sessionStorage.setItem('sector',data.sector);sessionStorage.setItem('tipoUsuario',data.tipoUsuario);sessionStorage.setItem('tipoNombre',data.tipoNombre||'');sessionStorage.setItem('cuadrilla',data.cuadrilla||'');location.href='home.html'}catch(err){msg.textContent=err.message}finally{setLoading(btn,false)}}
document.addEventListener('keydown',e=>{if(e.key==='Enter')login()});document.addEventListener('DOMContentLoaded',cargarUsuarios);
</script>
</body>
</html>
