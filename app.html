<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Registro - Reportes Agrupados</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="config.js"></script>
  <style>
    :root{--bg:#0b141d;--card:#14212d;--card2:#1a2a3a;--border:#2c3e50;--text:#fff;--muted:#a0aec0;--blue:#3b82f6;--green:#27ae60;--red:#e74c3c;--yellow:#f1c40f;}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);padding-bottom:24px}.top{position:sticky;top:0;z-index:10;background:rgba(20,33,45,.96);border-bottom:1px solid var(--border);padding:12px;display:flex;align-items:center;gap:10px}.back{width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:#1a2a3a;color:white}.top h2{margin:0;font-size:17px;line-height:1.2}.sub{color:var(--muted);font-size:12px}.wrap{max-width:720px;margin:0 auto;padding:14px 12px}.card{background:#14212d;border:1px solid var(--border);border-radius:16px;padding:15px;box-shadow:0 6px 18px rgba(0,0,0,.22)}label{display:block;color:var(--muted);font-size:13px;font-weight:800;margin:14px 0 6px}input{width:100%;background:#0f1b27;color:white;border:1px solid var(--border);border-radius:12px;padding:13px;font-size:16px;outline:none}input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.16)}.row{display:grid;grid-template-columns:1fr;gap:10px}.hint{font-size:12px;color:var(--muted);margin-top:6px}.asoc-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:14px}.asoc-head h3{margin:0;font-size:16px}.btn-add{border:1px solid var(--green);color:var(--green);background:transparent;border-radius:20px;padding:9px 11px;font-weight:900;white-space:nowrap}.asoc-list{display:grid;gap:9px;margin-top:10px}.asoc-item{display:grid;grid-template-columns:1fr 40px;gap:8px}.btn-del{border:1px solid var(--red);background:transparent;color:var(--red);border-radius:10px;font-weight:900}.actions{display:grid;grid-template-columns:1fr;gap:10px;margin-top:18px}.btn-save{border:none;border-radius:12px;background:var(--green);color:white;padding:14px;font-size:16px;font-weight:900;display:flex;justify-content:center;align-items:center;gap:8px}.btn-cancel{border:1px solid var(--border);border-radius:12px;background:#1a2a3a;color:white;padding:13px;font-size:15px;font-weight:800}.msg{min-height:20px;margin-top:12px;text-align:center;color:var(--red);font-size:13px}.readonly{opacity:.78}.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.58);z-index:2000;align-items:center;justify-content:center}.overlay-box{background:#14212d;border:1px solid var(--border);border-radius:14px;padding:18px 22px;text-align:center;font-weight:900}.overlay i{font-size:30px;color:var(--blue);margin-bottom:8px}button{cursor:pointer}button:disabled{cursor:not-allowed;opacity:.65}
  </style>
</head>
<body>
<header class="top"><button class="back" onclick="volver()"><i class="fas fa-arrow-left"></i></button><div><h2 id="titulo">Nuevo Reporte Agrupado</h2><div class="sub"><span id="usuarioTxt"></span> · <span id="sectorTxt"></span></div></div></header>
<main class="wrap"><section class="card"><form id="form" onsubmit="guardar(event)">
  <label>Fecha</label><input id="fecha" type="date" required>
  <label>Reporte Padre</label><input id="padre" type="text" inputmode="numeric" maxlength="7" placeholder="Ej. 1234567" required oninput="soloNumeros(this); marcarCambios()"><div class="hint">Debe ser número entero de 7 dígitos y el menor del grupo.</div>
  <div class="asoc-head"><h3><i class="fas fa-link"></i> Reportes Asociados</h3><button id="btnAdd" type="button" class="btn-add" onclick="agregarAsociado()"><i class="fas fa-plus"></i> Agregar</button></div>
  <div id="asocList" class="asoc-list"></div>
  <div class="hint">Puede agregar uno o varios asociados. Ninguno puede ser menor que el reporte padre.</div>
  <div class="actions"><button id="btnGuardar" class="btn-save" type="submit"><i class="fas fa-save"></i> Guardar</button><button class="btn-cancel" type="button" onclick="volver()"><i class="fas fa-times"></i> Cancelar</button></div>
  <div id="msg" class="msg"></div>
</form></section></main>
<div id="overlay" class="overlay"><div class="overlay-box"><i class="fas fa-spinner fa-spin"></i><div>Guardando...</div></div></div>
<script>
let modo='nuevo', idActual='', estadoActual='PENDIENTE', dirty=false, cargando=false;
function sesion(){return{usuario:sessionStorage.getItem('usuario')||'',sector:sessionStorage.getItem('sector')||'',tipoUsuario:sessionStorage.getItem('tipoUsuario')||'3'}}
function validarSesion(){const se=sesion();if(!se.usuario){location.href='index.html';return false}document.getElementById('usuarioTxt').textContent=se.usuario;document.getElementById('sectorTxt').textContent=se.sector;return true}
function hoy(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function fechaInput(ddmmyyyy){if(!ddmmyyyy)return hoy();if(/^\d{2}\/\d{2}\/\d{4}$/.test(ddmmyyyy)){const [d,m,y]=ddmmyyyy.split('/');return `${y}-${m}-${d}`}return ddmmyyyy}
function soloNumeros(inp){inp.value=inp.value.replace(/\D/g,'').slice(0,7)}
function marcarCambios(){if(!cargando)dirty=true}
function setLoading(btn,loading,text){if(!btn)return;if(loading){btn.dataset.old=btn.innerHTML;btn.disabled=true;btn.innerHTML=`<i class="fas fa-spinner fa-spin"></i> ${text||'Cargando...'}`}else{btn.disabled=false;if(btn.dataset.old)btn.innerHTML=btn.dataset.old}}
function overlay(show,text){const o=document.getElementById('overlay');if(text)o.querySelector('div div').textContent=text;o.style.display=show?'flex':'none'}
function api(action,params={}){return new Promise((resolve,reject)=>{if(!CONFIG.URL_APPS_SCRIPT||CONFIG.URL_APPS_SCRIPT.includes('PEGAR_AQUI'))return reject(new Error('Falta configurar URL_APPS_SCRIPT en config.js'));const cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*99999);params.action=action;params.callback=cb;const qs=Object.keys(params).map(k=>encodeURIComponent(k)+'='+encodeURIComponent(params[k]??'')).join('&');const sc=document.createElement('script');const timer=setTimeout(()=>{clean();reject(new Error('Tiempo de espera agotado.'))},30000);function clean(){clearTimeout(timer);delete window[cb];if(sc.parentNode)sc.parentNode.removeChild(sc)}window[cb]=data=>{clean();data&&data.ok?resolve(data):reject(new Error((data&&data.error)||'Error desconocido'))};sc.onerror=()=>{clean();reject(new Error('No se pudo conectar con Apps Script.'))};sc.src=CONFIG.URL_APPS_SCRIPT+'?'+qs;document.body.appendChild(sc)})}
function agregarAsociado(valor=''){const list=document.getElementById('asocList');const div=document.createElement('div');div.className='asoc-item';div.innerHTML=`<input class="asociado" type="text" inputmode="numeric" maxlength="7" placeholder="Reporte asociado" value="${valor}" oninput="soloNumeros(this); marcarCambios()"><button type="button" class="btn-del" onclick="eliminarAsociado(this)"><i class="fas fa-trash"></i></button>`;list.appendChild(div);marcarCambios()}
function eliminarAsociado(btn){if(document.querySelectorAll('.asociado').length<=1){alert('Debe quedar al menos un reporte asociado.');return}btn.closest('.asoc-item').remove();marcarCambios()}
function validar(){const padre=document.getElementById('padre').value.trim();const asociados=[...document.querySelectorAll('.asociado')].map(i=>i.value.trim()).filter(Boolean);if(!/^\d{7}$/.test(padre))throw new Error('El reporte padre debe tener 7 dígitos.');if(!asociados.length)throw new Error('Debe ingresar al menos un reporte asociado.');const usados={};for(let i=0;i<asociados.length;i++){const a=asociados[i];if(!/^\d{7}$/.test(a))throw new Error('El reporte asociado #'+(i+1)+' debe tener 7 dígitos.');if(Number(a)<Number(padre))throw new Error('El Reporte Padre debe ser el número menor. No puede ser mayor que un reporte asociado.');if(usados[a])throw new Error('Hay un reporte asociado repetido: '+a);usados[a]=true}return{padre,asociados}}
async function cargarEdicion(){const params=new URLSearchParams(location.search);idActual=params.get('id')||'';document.getElementById('fecha').value=hoy();agregarAsociado('');if(!idActual)return;modo='editar';document.getElementById('titulo').textContent='Editar Reporte Agrupado';overlay(true,'Cargando registro...');cargando=true;try{const data=await api('obtenerReporte',{id:idActual});const r=data.reporte;estadoActual=r.estado;if(estadoActual==='EJECUTADO'){alert('Este registro está EJECUTADO y no puede editarse.');location.href='home.html';return}document.getElementById('fecha').value=fechaInput(r.fecha);document.getElementById('padre').value=r.reportePadre;document.getElementById('asocList').innerHTML='';(r.asociados&&r.asociados.length?r.asociados:['']).forEach(a=>agregarAsociado(a));dirty=false}catch(e){alert(e.message);location.href='home.html'}finally{cargando=false;overlay(false)}}
async function guardar(e){e.preventDefault();const btn=document.getElementById('btnGuardar'), msg=document.getElementById('msg');msg.textContent='';let v;try{v=validar()}catch(err){msg.textContent=err.message;return}setLoading(btn,true,'Guardando...');overlay(true,'Guardando...');try{const se=sesion();const payload={modo,id:idActual,fecha:document.getElementById('fecha').value,reportePadre:v.padre,asociados:v.asociados,usuario:se.usuario,sector:se.sector};await api('guardarReporte',{payload:JSON.stringify(payload)});dirty=false;alert(modo==='editar'?'Registro actualizado correctamente.':'Registro guardado correctamente.');location.href='home.html'}catch(err){msg.textContent=err.message;alert(err.message)}finally{setLoading(btn,false);overlay(false)}}
function volver(){if(dirty){if(!confirm('Tiene datos sin guardar. ¿Seguro que quiere salir sin guardar?'))return}location.href='home.html'}
window.addEventListener('beforeunload',e=>{if(dirty){e.preventDefault();e.returnValue=''}});
document.addEventListener('DOMContentLoaded',()=>{if(!validarSesion())return;document.getElementById('fecha').addEventListener('change',marcarCambios);document.getElementById('padre').addEventListener('input',marcarCambios);cargarEdicion()});
</script>
</body>
</html>
