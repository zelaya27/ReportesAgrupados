<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Reportes Agrupados UTCD</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="config.js"></script>
  <style>
    :root{
      --ms-blue:#0078d4;
      --ms-blue-dark:#005a9e;
      --bg:#f3f6fb;
      --surface:#fff;
      --text:#201f1e;
      --muted:#605e5c;
      --border:#d2d0ce;
      --danger:#d13438;
      --shadow:0 18px 45px rgba(0,0,0,.16);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
      margin:0;min-height:100vh;font-family:'Segoe UI',Arial,sans-serif;
      background:linear-gradient(160deg,#f7fbff,#edf4fb 52%,#e5f1fb);
      color:var(--text);display:flex;align-items:center;justify-content:center;padding:18px;
    }
    .login-card{width:100%;max-width:420px;background:var(--surface);border:1px solid #edebe9;border-radius:24px;padding:24px 20px;box-shadow:var(--shadow)}
    .logo-box{width:90px;margin:0 auto 14px;background:white;border:1px solid #edebe9;border-radius:18px;padding:9px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 18px rgba(0,0,0,.08)}
    .logo-box img{width:68px;height:auto;display:block}
    h1{margin:0;text-align:center;font-size:20px;line-height:1.2;letter-spacing:.3px;color:#323130}
    .sub{text-align:center;color:var(--muted);font-size:13px;margin:8px 0 22px}
    label{font-size:13px;color:var(--muted);font-weight:800;margin-bottom:6px;display:block}
    .field{position:relative;margin-bottom:15px}
    .field i{position:absolute;left:13px;top:39px;color:var(--ms-blue)}
    select,input{width:100%;background:#fff;color:var(--text);border:1px solid var(--border);border-radius:14px;padding:14px 14px 14px 42px;font-size:16px;outline:none}
    select:focus,input:focus{border-color:var(--ms-blue);box-shadow:0 0 0 4px rgba(0,120,212,.12)}
    .btn{width:100%;border:none;border-radius:14px;padding:14px 18px;background:var(--ms-blue);color:white;font-weight:900;font-size:16px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;box-shadow:0 8px 18px rgba(0,120,212,.25)}
    .btn:active{transform:scale(.99)}
    .btn:disabled{opacity:.7;cursor:not-allowed}
    .msg{margin-top:14px;text-align:center;font-size:13px;color:var(--danger);min-height:18px;line-height:1.35}
    .note{margin-top:12px;text-align:center;color:var(--muted);font-size:12px;line-height:1.35}
  </style>
</head>
<body>
  <main class="login-card">
    <div class="logo-box">
      <img src="https://raw.githubusercontent.com/zelaya27/IMAGENES_AZ/main/UTCD%20Vertical.png" alt="UTCD">
    </div>

    <h1>REPORTES AGRUPADOS UTCD</h1>
    <div class="sub">Ingreso de usuario operativo</div>

    <div class="field">
      <label for="usuario">Usuario</label>
      <i class="fas fa-user"></i>
      <select id="usuario">
        <option value="">Cargando usuarios...</option>
      </select>
    </div>

    <div class="field">
      <label for="password">Contraseña</label>
      <i class="fas fa-lock"></i>
      <input id="password" type="password" autocomplete="current-password" placeholder="Ingrese contraseña">
    </div>

    <button id="btnLogin" class="btn" onclick="login()">
      <i class="fas fa-sign-in-alt"></i> Ingresar
    </button>

    <div id="msg" class="msg"></div>
    <div class="note">Sistema móvil conectado a Google Sheets</div>
  </main>

<script>
  /******************************************************
   * API JSONP
   * Se usa <script> dinámico para evitar problemas de CORS.
   ******************************************************/
  function api(action, params = {}) {
    return new Promise((resolve, reject) => {
      if (!window.CONFIG || !CONFIG.URL_APPS_SCRIPT || CONFIG.URL_APPS_SCRIPT.includes('PEGAR_AQUI')) {
        reject(new Error('Falta configurar URL_APPS_SCRIPT en config.js'));
        return;
      }

      const cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random() * 99999);
      params.action = action;
      params.callback = cb;

      const qs = Object.keys(params)
        .map(k => encodeURIComponent(k) + '=' + encodeURIComponent(params[k] ?? ''))
        .join('&');

      const script = document.createElement('script');
      const timer = setTimeout(() => {
        cleanup();
        reject(new Error('Tiempo de espera agotado.'));
      }, 30000);

      function cleanup() {
        clearTimeout(timer);
        delete window[cb];
        if (script.parentNode) script.parentNode.removeChild(script);
      }

      window[cb] = data => {
        cleanup();
        data && data.ok ? resolve(data) : reject(new Error((data && data.error) || 'Error desconocido'));
      };

      script.onerror = () => {
        cleanup();
        reject(new Error('No se pudo conectar con Apps Script.'));
      };

      script.src = CONFIG.URL_APPS_SCRIPT + '?' + qs;
      document.body.appendChild(script);
    });
  }

  function setLoading(btn, loading, text) {
    if (!btn) return;
    if (loading) {
      btn.dataset.old = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${text || 'Cargando...'}`;
    } else {
      btn.disabled = false;
      if (btn.dataset.old) btn.innerHTML = btn.dataset.old;
    }
  }

  /******************************************************
   * Carga lista de usuarios desde hoja usuarios columna A.
   ******************************************************/
  async function cargarUsuarios() {
    const sel = document.getElementById('usuario');
    const msg = document.getElementById('msg');
    msg.textContent = '';

    try {
      const data = await api('listarUsuarios');
      const usuarios = data.usuarios || [];

      if (!usuarios.length) {
        sel.innerHTML = '<option value="">No hay usuarios configurados</option>';
        return;
      }

      sel.innerHTML = '<option value="">Seleccione usuario</option>' + usuarios
        .map(u => `<option value="${u}">${u}</option>`)
        .join('');
    } catch (err) {
      sel.innerHTML = '<option value="">Error al cargar usuarios</option>';
      msg.textContent = err.message;
    }
  }

  /******************************************************
   * Login. Si valida, guarda sesión y entra al home.
   ******************************************************/
  async function login() {
    const btn = document.getElementById('btnLogin');
    const msg = document.getElementById('msg');
    msg.textContent = '';

    const usuario = document.getElementById('usuario').value.trim().toUpperCase();
    const password = document.getElementById('password').value.trim();

    if (!usuario || !password) {
      msg.textContent = 'Seleccione usuario e ingrese contraseña.';
      return;
    }

    setLoading(btn, true, 'Ingresando...');

    try {
      const data = await api('login', { usuario, password });

      sessionStorage.setItem('usuario', data.usuario);
      sessionStorage.setItem('sector', data.sector);
      sessionStorage.setItem('tipoUsuario', data.tipoUsuario || '');
      sessionStorage.setItem('tipoNombre', data.tipoNombre || '');
      sessionStorage.setItem('cuadrilla', data.cuadrilla || '');

      location.href = 'home.html';
    } catch (err) {
      msg.textContent = err.message;
    } finally {
      setLoading(btn, false);
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  document.addEventListener('DOMContentLoaded', cargarUsuarios);
</script>
</body>
</html>
